services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    # Come back automatically after a crash, OOM, or droplet reboot — essential
    # for running unattended 24/7.
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - app-data:/app/data
    env_file:
      - backend/.env
    environment:
      - PORT=8080
      - ALLOWED_ORIGINS=same-origin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  app-data:
