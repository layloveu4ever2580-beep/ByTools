services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - app-data:/app/data
    env_file:
      - backend/.env
    environment:
      - PORT=8080
      - ALLOWED_ORIGINS=same-origin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  app-data:
